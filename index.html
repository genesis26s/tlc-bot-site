<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLC | Command Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        select, input { background: #0a0a0a !important; border: 1px solid #333 !important; }
        select:focus, input:focus { border-color: #fff !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center border-b border-white/10 pb-6">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">TLC Control Plane</h1>
                <p class="text-xs text-zinc-500 uppercase tracking-widest mono" id="conn-status">Syncing Telemetry...</p>
            </div>
            <div id="server-badge" class="px-4 py-2 bg-white text-black font-bold text-xs uppercase tracking-wider rounded">No Server Selected</div>
        </header>

        <!-- Main Config Panel -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Ticket Configs -->
            <div class="lg:col-span-2 space-y-6">
                <section class="glass p-6 rounded-lg">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="ticket"></i> Ticket Queues</h2>
                    <div id="queues-list" class="space-y-3 mb-6"></div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/10">
                        <div>
                            <label class="block text-[10px] uppercase text-zinc-500 mb-2">Support Role</label>
                            <select id="role-select" class="w-full p-3 rounded text-sm"><option>Loading roles...</option></select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase text-zinc-500 mb-2">Category Channel</label>
                            <select id="cat-select" class="w-full p-3 rounded text-sm"><option>Loading categories...</option></select>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Actions -->
            <aside class="space-y-4">
                <div class="glass p-6 rounded-lg">
                    <h3 class="font-bold text-sm mb-4">Deployment</h3>
                    <button onclick="deployPanel()" class="w-full bg-white text-black font-bold py-3 text-xs uppercase hover:bg-zinc-200 transition">Deploy Ticket Panel</button>
                    <p class="text-[10px] text-zinc-500 mt-3 text-center">Deploys the live embed to the selected channel.</p>
                </div>
                
                <div class="glass p-6 rounded-lg">
                    <h3 class="font-bold text-sm mb-4">Diagnostics</h3>
                    <div class="flex justify-between text-xs py-2 border-b border-white/5">
                        <span class="text-zinc-500">Database Connection</span>
                        <span id="db-state" class="font-mono text-white">UNKNOWN</span>
                    </div>
                    <div class="flex justify-between text-xs py-2">
                        <span class="text-zinc-500">API Latency</span>
                        <span id="ping-state" class="font-mono text-white">-- ms</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Fetches telemetry data produced by your bot's sync.py
        async function refreshDashboard() {
            try {
                const res = await fetch("https://api.github.com/gists/YOUR_GIST_ID?nocache=" + Date.now());
                const data = await res.json();
                const status = JSON.parse(data.files['status.json'].content);
                
                // Update Diagnostics
                document.getElementById('db-state').innerText = status.database_ok ? "CONNECTED" : "DISCONNECTED";
                document.getElementById('ping-state').innerText = status.latency_ms + "ms";
                
                // Update Dropdowns
                const guildId = "YOUR_GUILD_ID"; // Logic to cycle this based on selection
                const meta = status.guilds_metadata[guildId];
                
                if(meta) {
                    const roleSelect = document.getElementById('role-select');
                    roleSelect.innerHTML = meta.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
                    
                    const catSelect = document.getElementById('cat-select');
                    catSelect.innerHTML = meta.channels.filter(c => c.type === 'category').map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }
            } catch(e) { console.error("Telemetry unreachable"); }
        }
        
        lucide.createIcons();
        setInterval(refreshDashboard, 5000);
        refreshDashboard();
    </script>
</body>
</html>
